<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Seite nicht gefunden | Sebastian Selinger</title>
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#2563eb">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="mask-icon" href="/favicon.svg" color="#2563eb">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0c1117;
            --text: #e6edf3;
            --muted: #8b97a3;
            --accent-a: #2563eb;
            --accent-b: #0d9488;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 0%, #111a22 0%, var(--bg) 70%);
            color: var(--text);
            font-family: var(--font);
            text-align: center;
            padding: 24px;
        }
        .wrap { max-width: 520px; }
        .code {
            font-family: var(--font-mono);
            font-size: clamp(72px, 18vw, 140px);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h1 { font-size: clamp(20px, 4vw, 28px); margin: 16px 0 8px; }
        p { color: var(--muted); font-size: 16px; line-height: 1.6; margin-bottom: 28px; }
        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: transform .15s ease, box-shadow .15s ease;
        }
        .home-link:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37, 99, 235, .35); }
        [data-lang="de"] [data-lang-en], [data-lang="en"] [data-lang-de] { display: none; }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="code">404</div>
        <h1>
            <span data-lang-de>Seite nicht gefunden</span>
            <span data-lang-en>Page not found</span>
        </h1>
        <p>
            <span data-lang-de>Die angeforderte Seite existiert nicht oder wurde verschoben.</span>
            <span data-lang-en>The page you requested does not exist or has been moved.</span>
        </p>
        <a class="home-link" href="/">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span data-lang-de>Zur Startseite</span>
            <span data-lang-en>Back to home</span>
        </a>
    </main>
    <script>
        (function () {
            var saved = localStorage.getItem('lang');
            var browser = (navigator.language || 'de').toLowerCase().indexOf('de') === 0 ? 'de' : 'en';
            var lang = (saved === 'de' || saved === 'en') ? saved : browser;
            document.documentElement.lang = lang;
            document.documentElement.setAttribute('data-lang', lang);
        })();
    </script>
</body>
</html>
